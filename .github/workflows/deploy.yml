name: Deploy to GitHub Pages

on:
  # 推到預設分支時自動部署
  push:
    branches: [main]
  # 也可在 Actions 頁面手動觸發
  workflow_dispatch:

# 最小權限：workflow 層級只給讀取；Pages 部署權限只授予 deploy job
permissions:
  contents: read

# 同時只跑一個部署，且不取消進行中的正式部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 後續步驟不做任何 git 操作，不需要保留 GITHUB_TOKEN
          persist-credentials: false

      - name: Setup pnpm
        # 版本由 package.json 的 "packageManager" 欄位決定，
        # 此處不再指定 version，避免與其重複而觸發 ERR_PNPM_BAD_PM_VERSION
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (SSG)
        run: pnpm build
        env:
          # 讓 vite base 切成 /blog/，資產路徑才會對應 project page 子路徑
          GITHUB_PAGES: "true"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # base 為 /blog/ 時，SSG 會把整個站輸出到 dist/blog/；
          # 這個子目錄的根會對應到 Pages 服務的 /blog/ 路徑，故上傳它。
          path: dist/blog

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Pages 部署所需的權限只授予此 job
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
